body:
  text: 潄玉詞宋李清照撰鳳凰臺上憶吹簫閨情香冷金猊被翻紅浪起來慵自梳頭任寶奩塵滿日上簾鈎生怕離懷别苦多少事欲説還休新來瘦非干病酒不是悲秋休休這回去也千萬遍陽關也則難留念武陵人逺煙鎖秦樓惟有樓前流水應念我終日凝眸凝眸處從今又添一段新愁聲聲慢秋情尋尋覓覓冷冷清清凄凄慘慘戚戚乍暖還寒時候最難將息三杯兩盞淡酒怎敵他曉來風急雁過也正傷心却是舊時相識滿地黃花堆積憔悴損如今有誰堪摘守著窗兒獨自怎生得黑梧桐更兼細雨到黃昏點點滴滴這次第怎一箇愁字了得壺中天慢春情蕭條庭院又斜風細雨重門須閉寵柳嬌花寒食近種種惱人天氣險韻詩成扶頭酒醒别是間滋味征鴻過盡萬千心事難寄樓上幾日春寒簾垂四面玉欄杆慵倚被冷香銷新夢覺不許愁人不起清露晨流新桐初引多少遊春意日髙煙斂更看今日晴未漁家傲記夢天接雲濤連曉霧星河欲轉千帆舞倣佛夢魂歸帝所聞天語殷勤問我歸何處我報路長嗟日暮學詩謾有驚人句九萬里風鵬正舉風休住蓬舟吹取三山去一剪梅别愁紅藕香殘玉簟秋輕解羅裳獨上蘭舟雲中誰寄錦書來鴈字回時月滿西樓花自飄零水自流一種相思兩處間愁此情無計可消除才下眉頭却上心頭如夢令酒興常記溪亭日暮沈醉不知歸路興盡晚回舟誤入藕花深處爭渡爭渡驚起一行鷗鷺又昨夜雨踈風驟濃睡不消殘酒試問卷簾人却道海棠依舊知否知否應是緑肥紅瘦醉花隂九日薄霧濃雲愁永晝瑞腦銷金獸時節又重陽玉枕紗厨半夜涼初透東籬把酒黃昏後有暗香盈袖莫道不消魂簾卷西風人似黃花瘦怨王孫春暮夢斷漏悄愁濃酒惱寶枕生寒翠屏向曉門外誰掃殘紅夜來風玉簫聲斷人何處春又去忍把歸期負此情此恨此際擬託行雲問東君又春暮帝里春晚重門深院草緑階前暮天雁斷樓上遠信誰傳恨綿綿多情自是多沾惹難拚捨又是寒食也鞦韆巷陌人靜皎月初斜浸梨花蝶戀花離情暖雨和風初破凍柳潤梅輕巳覺春心動酒意詩情誰與共淚融殘粉花鈿重乍試夾衣金縷縫山枕欹斜枕損叉頭鳳獨抱濃愁無好夢夜闌猶剪燈花弄浣溪沙春暮樓上晴天碧四垂樓前芳草接天涯勸君莫上最髙梯新笋看成堂下竹落花都上燕巢泥忍聽林表杜鵑啼又髻子傷春懶更梳晚風庭院落梅初淡雲來往月疏疏玉鴨薰爐間瑞腦朱櫻斗帳掩流蘇通犀還解辟寒無又繡面芙蓉一笑開斜飛寶鴨襯香腮眼波才動被人猜一面風情深有韻半箋嬌恨寄幽懷月移花影約重來武陵春春晚風住塵香花巳盡日晚倦梳頭物是人非事事休欲語淚先流聞説雙溪春尚好也擬泛輕舟只恐雙溪舴艋舟載不動許多愁點絳唇閨思寂莫深閨柔腸一寸愁千縷惜春春去幾點催花雨倚遍闌干秪是無情緒人何處連天芳草望斷歸來路雨中花閨情素約小腰身不奈傷春疏梅影下晚粧新裊裊娉婷何樣似一縷輕雲歌巧動朱唇字字嬌嗔桃花深徑一通津悵望瑤臺清夜月還送歸輪附金石録後序豫以建中辛巳歸趙氏時丞相作吏部侍郎家素貧儉德甫在太學每朔望謁告出質衣取半千錢步入相國寺市碑文果實歸相對展玩咀嚼後二年從官便有窮盡天下古文竒字之志傳寫未見書買名人書畫古竒器有持徐熙牡丹圖求錢二十萬留信宿計無所出捲還之夫婦相向惋悵者數日及連守兩郡竭俸入以事鉛槧每獲一書即日勘挍裝緝得書畫彛鼎亦摩玩舒卷摘指疵病盡一燭為率故紙札精緻字畫全整冠於諸家每飯罷坐歸來堂烹茶指堆積書史言某事在某書某卷第幾葉第幾行以中否勝負為飲茶先後中則舉杯大笑或至茶覆懷中不得飲而起凡書史百家字不刓缺本不誤者輒市之儲作副本靖康丙午德甫守淄川聞金人犯京師盈箱溢篋戀戀悵悵知其必不為巳物建炎丁未奔太夫人喪南來既長物不能盡載乃先去書之印本重大者畫之多幅者器之無欵識者巳又去書之監本者畫之平常者器之重大者所載尚十五車連艫渡淮江其青州故第所鎖十間屋期以明年具舟載之又化為煨燼巳酉歲六月德甫駐家池陽獨赴行都自岸上望舟中告别豫意甚惡呼曰如傳聞城中緩急奈何遙應曰從衆必不得巳先棄輜重次衣衾次書册次卷軸次古器獨宋器者可自負抱與身俱存亡勿忘之徑馳馬去秋八月德甫以病不起時六宫往江西豫遣二吏部所存書二萬卷金石刻二千本先往洪州至冬洪州陷遂盡委棄所謂連艫渡江者又散為雲煙矣獨餘輕小卷軸寫本李杜韓柳集世説鹽鐡論石刻數十副軸鼎鼐十數事及南唐書數篋偶在卧內巋然獨存上江既不可往乃之台溫之衢之越之杭寄物於嵊縣庚戍春官軍收叛卒悉取去入故李將軍家巋然者十失五六猶有五七簏挈家寓越城一夕為盜穴壁負五簏去盡為吳説運使賤價得之僅存不成部帙殘書䇿數種忽閲此書如見故人因憶德甫在東萊靜治堂裝標初就藝籖縹帶束十卷作一帙日挍二卷跋一卷此二千卷有題跋者五百二卷耳今手澤如新墓木巳拱乃知有有必有無有聚必有散亦理之常又胡足道所以區區記其終始者亦欲為後世好古博雅者之戒云龍舒郡庫刻其書而此序不見洪容齋見元藁於王順伯因為拈出易安作序時紹興四年也李易安賀人孿生啓中有云無午未二時之分有伯仲兩楷之似既繫臂而繫足實難弟而難兄玉刻雙璋錦挑對褓注云任文二子孿生德卿生于午道卿生于未張伯楷仲楷兄弟形狀無二白汲兄弟母不能辨以五色繩一繫于臂一繫于足漱玉集不載此啓見文粹補遺趙明誠幼時其父將為擇婦明誠晝寢夢誦一書覺來惟憶三句云言與司合安上巳脫芝芙草拔以告其父其父為解曰女殆得能文詞婦也言與司合是詞字安上巳脫是女字芝芙草拔是之夫二字非謂汝為詞女之夫乎後李翁以女女之即易安也果有文章易安結褵未久明誠即負笈逺遊易安殊不忍别覓錦帕書一剪梅詞以送之易安以重陽醉花隂詞函致明誠明誠嘆賞自愧弗逮務欲勝之一切謝客忘食忘寢者三日夜得五十闋雜易安作以示友人陸德夫德夫玩之再三曰只三句絶佳明誠詰之答曰莫道不消魂簾捲西風人似黃花瘦政易安作也宋人中填詞李易安亦稱冠絶使在衣冠當與秦七黃九爭雄不獨雄於閨閣也其詞名潄玉集尋之未得聲聲慢一詞最為婉妙荃翁張端義貴耳集云此詞首下十四箇疉字乃公孫大娘舞劎手本朝非無能詞之士未曾有下十四箇疉字者乃用文選諸賦格守著窗兒獨自怎生得黑此黑字不許第二人押又梧桐更兼細雨到黃昏點點滴滴四疉字又無斧䀶婦人中有此殆間氣也晚年自南渡後懷京洛舊事賦元宵永遇樂詞云落月鎔金暮雲合璧巳自工緻至於染栁煙輕吹梅笛怨春意知幾許氣象更好後疉云於今憔悴風鬟霜鬢怕見夜間出去皆以尋常言語度入音律鍊句精巧者易平淡入妙者難山谷所謂以故為新以俗為雅者易安先得之矣張子韶對䇿有桂子飄香之語趙明誠妻李氏嘲之曰露花倒影栁三變桂子飄香張九成漱玉詞
